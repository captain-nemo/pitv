<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480, initial-scale=1.0">
<title>PiTV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #4fc3f7;
    --text: #e8eaf6;
    --muted: #546e7a;
    --green: #69f0ae;
    --red: #ff5252;
  }

  html, body {
    width: 480px; height: 320px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
    cursor: none;
  }

  /* ── Layout ── */
  #container {
    position: relative;
    width: 480px; height: 320px;
    overflow: hidden;
  }

  .app {
    position: absolute;
    width: 480px; height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateX(100%);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }
  .app.active { opacity: 1; transform: translateX(0); pointer-events: all; }
  .app.exit-left  { opacity: 0; transform: translateX(-100%); }
  .app.exit-right { opacity: 0; transform: translateX(100%); }

  /* ── Touch zones ── */
  .touch-zone {
    position: fixed; top: 0; height: 100%;
    width: 50px; z-index: 100;
  }
  #touch-left  { left: 0; }
  #touch-right { right: 0; }

  /* ── Dot nav ── */
  #dots {
    position: fixed; bottom: 6px;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 99;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: var(--accent); transform: scale(1.4); }

  /* ── Status bar ── */
  #statusbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 18px; display: flex; align-items: center;
    justify-content: flex-end; padding: 0 8px;
    font-size: 10px; color: var(--muted); z-index: 98;
  }
  #ws-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--red); margin-left: 5px;
    transition: background 0.3s;
  }
  #ws-dot.on { background: var(--green); }

  /* ════════════════
     CLOCK
  ════════════════ */
  #app-clock {
    background: radial-gradient(ellipse at center, #0d1117 0%, var(--bg) 80%);
  }
  #clock-time {
    font-size: 90px; font-weight: 200; letter-spacing: -3px;
    color: var(--accent); line-height: 1;
    text-shadow: 0 0 30px rgba(79,195,247,0.3);
  }
  #clock-date {
    font-size: 14px; color: var(--muted); margin-top: 6px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  #clock-day {
    font-size: 11px; color: var(--muted); margin-top: 3px;
    letter-spacing: 2px; text-transform: uppercase; opacity: 0.6;
  }

  /* ════════════════
     WEATHER
  ════════════════ */
  #app-weather {
    background: linear-gradient(160deg, #0d1b2a 0%, #0a0a0f 100%);
    padding: 14px; justify-content: flex-start;
  }
  #weather-current {
    display: flex; align-items: center; gap: 12px;
    margin-top: 18px; width: 100%; padding: 0 10px;
  }
  #weather-icon { font-size: 50px; line-height: 1; }
  #weather-main { flex: 1; }
  #weather-temp { font-size: 44px; font-weight: 200; color: var(--text); line-height: 1; }
  #weather-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
  #weather-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 10px; }
  #weather-forecast {
    display: flex; gap: 6px; margin-top: 14px;
    padding: 0 10px; width: 100%;
  }
  .forecast-day {
    flex: 1; background: var(--surface); border-radius: 8px;
    padding: 7px 4px; text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .forecast-day .f-name  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .forecast-day .f-icon  { font-size: 20px; margin: 3px 0; }
  .forecast-day .f-temps { font-size: 11px; }
  .forecast-day .f-hi    { color: var(--text); }
  .forecast-day .f-lo    { color: var(--muted); margin-left: 4px; }
  #weather-location { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }

  /* ════════════════
     CRYPTO
  ════════════════ */
  #app-crypto {
    background: linear-gradient(160deg, #0a0f1a 0%, #0a0a0f 100%);
    flex-direction: column; justify-content: flex-start;
    align-items: stretch; padding: 0;
  }
  #crypto-header {
    display: flex; align-items: center;
    padding: 6px 10px 4px; gap: 8px;
    height: 38px; flex-shrink: 0;
  }
  .coin-tab {
    padding: 3px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .coin-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  #crypto-price-info { flex: 1; text-align: right; }
  #crypto-current-price { font-size: 18px; font-weight: 200; color: var(--text); }
  #crypto-current-change { font-size: 12px; margin-left: 5px; }
  #crypto-current-change.pos { color: var(--green); }
  #crypto-current-change.neg { color: var(--red); }
  #crypto-canvas-wrap { flex: 1; overflow: hidden; min-height: 0; }
  #crypto-canvas { display: block; }
  #crypto-controls {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px 6px; height: 34px; flex-shrink: 0;
  }
  .ctrl-group { display: flex; gap: 4px; align-items: center; }
  .ctrl-label { font-size: 9px; color: var(--muted); margin-right: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .ctrl-btn {
    padding: 3px 8px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px; color: var(--muted); cursor: pointer;
    transition: all 0.2s; background: transparent;
  }
  .ctrl-btn.active { background: rgba(79,195,247,0.15); color: var(--accent); border-color: var(--accent); }
  #crypto-updated-small { font-size: 10px; color: var(--muted); }

  /* ════════════════
     PHOTO
  ════════════════ */
  #app-photo { background: #000; justify-content: center; }
  #photo-img { max-width: 480px; max-height: 320px; object-fit: contain; display: none; }
  #photo-placeholder { color: var(--muted); font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="statusbar">
  <span id="ws-label">ws</span>
  <div id="ws-dot"></div>
</div>

<div id="touch-left"  class="touch-zone"></div>
<div id="touch-right" class="touch-zone"></div>

<div id="container">

  <!-- CLOCK -->
  <div id="app-clock" class="app active">
    <div id="clock-time">00:00</div>
    <div id="clock-date">zondag 1 januari</div>
    <div id="clock-day">week 1</div>
  </div>

  <!-- WEATHER -->
  <div id="app-weather" class="app">
    <div id="weather-current">
      <div id="weather-icon">⛅</div>
      <div id="weather-main">
        <div id="weather-temp">--°</div>
        <div id="weather-desc">Laden...</div>
        <div id="weather-meta">
          <span>💧<span id="w-humidity">--</span>%</span>
          <span>💨<span id="w-wind">--</span>km/h</span>
          <span>👁<span id="w-vis">--</span>km</span>
        </div>
      </div>
    </div>
    <div id="weather-forecast"></div>
    <div id="weather-location">Venlo, NL</div>
  </div>

  <!-- CRYPTO -->
  <div id="app-crypto" class="app">
    <div id="crypto-header">
      <div class="coin-tab active" data-coin="BTC" onclick="selectCoin('BTC')">₿ BTC</div>
      <div class="coin-tab" data-coin="ETH" onclick="selectCoin('ETH')">Ξ ETH</div>
      <div id="crypto-price-info">
        <span id="crypto-current-price">$--</span>
        <span id="crypto-current-change" class="pos">--%</span>
      </div>
    </div>
    <div id="crypto-canvas-wrap">
      <canvas id="crypto-canvas"></canvas>
    </div>
    <div id="crypto-controls">
      <div class="ctrl-group">
        <span class="ctrl-label">Bars</span>
        <div class="ctrl-btn active" data-bars="30" onclick="selectBars(30)">30</div>
        <div class="ctrl-btn" data-bars="50" onclick="selectBars(50)">50</div>
        <div class="ctrl-btn" data-bars="80" onclick="selectBars(80)">80</div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-btn active" data-interval="1h" onclick="selectInterval('1h')">1H</div>
        <div class="ctrl-btn" data-interval="4h" onclick="selectInterval('4h')">4H</div>
        <div class="ctrl-btn" data-interval="1d" onclick="selectInterval('1d')">1D</div>
      </div>
      <div id="crypto-updated-small">--:--</div>
    </div>
  </div>

  <!-- PHOTO -->
  <div id="app-photo" class="app">
    <img id="photo-img" src="" alt="">
    <div id="photo-placeholder">Wachten op afbeelding...</div>
  </div>

</div>

<div id="dots">
  <div class="dot active" data-app="clock"></div>
  <div class="dot" data-app="weather"></div>
  <div class="dot" data-app="crypto"></div>
  <div class="dot" data-app="photo"></div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const APPS          = ['clock', 'weather', 'crypto', 'photo'];
const AUTO_ROTATE_MS = 30000;
const REFRESH_MS     = 5 * 60 * 1000;
const WS_URL         = `ws://${location.host}/ws`;
const WEATHER_LAT    = 51.37, WEATHER_LON = 6.17;

// ── State ────────────────────────────────────────────────────────────────────
let currentIdx   = 0;
let rotateTimer  = null;
let ws           = null;
let photoActive  = false;

// ── Navigation ───────────────────────────────────────────────────────────────
function showApp(name, direction = 'right') {
  const idx = APPS.indexOf(name);
  if (idx === -1) return;
  const prev = APPS[currentIdx];
  if (prev === name) return;

  const prevEl = document.getElementById(`app-${prev}`);
  const nextEl = document.getElementById(`app-${name}`);

  prevEl.classList.remove('active');
  prevEl.classList.add(direction === 'right' ? 'exit-left' : 'exit-right');
  setTimeout(() => prevEl.classList.remove('exit-left', 'exit-right'), 400);

  nextEl.style.transform = direction === 'right' ? 'translateX(100%)' : 'translateX(-100%)';
  nextEl.classList.add('active');

  currentIdx  = idx;
  photoActive = name === 'photo' && document.getElementById('photo-img').style.display !== 'none';
  updateDots();
  resetRotateTimer();
}

function nextApp() { showApp(APPS[(currentIdx + 1) % APPS.length], 'right'); }
function prevApp() { showApp(APPS[(currentIdx - 1 + APPS.length) % APPS.length], 'left'); }

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentIdx));
}

// ── Auto-rotate ───────────────────────────────────────────────────────────────
function resetRotateTimer() {
  clearTimeout(rotateTimer);
  if (photoActive) return;
  rotateTimer = setTimeout(nextApp, AUTO_ROTATE_MS);
}

// ── Touch / swipe ─────────────────────────────────────────────────────────────
document.getElementById('touch-left').addEventListener('click', prevApp);
document.getElementById('touch-right').addEventListener('click', nextApp);

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) dx < 0 ? nextApp() : prevApp();
});

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => document.getElementById('ws-dot').classList.add('on');
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'show_image') {
      const img = document.getElementById('photo-img');
      img.src = msg.data;
      img.style.display = 'block';
      document.getElementById('photo-placeholder').style.display = 'none';
      photoActive = true;
      showApp('photo', 'right');
    } else if (msg.type === 'switch_app') {
      showApp(msg.app, 'right');
    }
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('on');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
}

// ── Clock ─────────────────────────────────────────────────────────────────────
const DAYS   = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MONTHS = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('clock-date').textContent =
    `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]}`;
  document.getElementById('clock-day').textContent = `week ${getWeekNumber(now)}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Weather ───────────────────────────────────────────────────────────────────
const WMO_ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️',
};
const WMO_DESC = {
  0:'Helder',1:'Overwegend helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',
  45:'Mist',48:'Rijp mist',51:'Lichte motregen',53:'Motregen',55:'Dichte motregen',
  61:'Lichte regen',63:'Regen',65:'Zware regen',71:'Lichte sneeuw',73:'Sneeuw',
  75:'Zware sneeuw',80:'Lichte buien',81:'Buien',82:'Zware buien',
  95:'Onweer',96:'Onweer met hagel',99:'Zwaar onweer',
};

async function fetchWeather() {
  try {
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}` +
      `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,visibility,weather_code` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min&wind_speed_unit=kmh` +
      `&timezone=Europe%2FAmsterdam&forecast_days=4`);
    const d = await r.json();
    const c = d.current;
    document.getElementById('weather-icon').textContent = WMO_ICONS[c.weather_code] || '🌡️';
    document.getElementById('weather-temp').textContent = `${Math.round(c.temperature_2m)}°`;
    document.getElementById('weather-desc').textContent = WMO_DESC[c.weather_code] || '';
    document.getElementById('w-humidity').textContent = c.relative_humidity_2m;
    document.getElementById('w-wind').textContent = Math.round(c.wind_speed_10m);
    document.getElementById('w-vis').textContent = Math.round((c.visibility || 0) / 1000);

    const dayNames = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
    const fc = document.getElementById('weather-forecast');
    fc.innerHTML = '';
    for (let i = 1; i <= 3; i++) {
      const date = new Date(d.daily.time[i]);
      const div  = document.createElement('div');
      div.className = 'forecast-day';
      div.innerHTML = `
        <div class="f-name">${dayNames[date.getDay()]}</div>
        <div class="f-icon">${WMO_ICONS[d.daily.weather_code[i]] || '🌡️'}</div>
        <div class="f-temps">
          <span class="f-hi">${Math.round(d.daily.temperature_2m_max[i])}°</span>
          <span class="f-lo">${Math.round(d.daily.temperature_2m_min[i])}°</span>
        </div>`;
      fc.appendChild(div);
    }
  } catch (err) {
    document.getElementById('weather-desc').textContent = 'Ophalen mislukt';
  }
}

// ── Crypto Candlestick ────────────────────────────────────────────────────────
let cryptoCoin     = 'BTC';
let cryptoInterval = '1h';
let cryptoBars     = 30;
const BINANCE_SYMBOLS = { BTC: 'BTCUSDT', ETH: 'ETHUSDT' };

function fmtPrice(p) {
  return p >= 1000
    ? '$' + p.toLocaleString('nl-NL', {maximumFractionDigits: 0})
    : '$' + p.toLocaleString('nl-NL', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtPriceShort(p) {
  return p >= 1000 ? '$' + (p / 1000).toFixed(1) + 'k' : '$' + p.toFixed(0);
}

function selectCoin(coin) {
  cryptoCoin = coin;
  document.querySelectorAll('.coin-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.coin === coin));
  fetchCrypto();
}
function selectInterval(iv) {
  cryptoInterval = iv;
  document.querySelectorAll('[data-interval]').forEach(b =>
    b.classList.toggle('active', b.dataset.interval === iv));
  fetchCrypto();
}
function selectBars(n) {
  cryptoBars = n;
  document.querySelectorAll('[data-bars]').forEach(b =>
    b.classList.toggle('active', b.dataset.bars == n));
  fetchCrypto();
}

async function fetchCrypto() {
  try {
    const url = `https://api.binance.com/api/v3/klines?symbol=${BINANCE_SYMBOLS[cryptoCoin]}&interval=${cryptoInterval}&limit=${cryptoBars}`;
    const data = await (await fetch(url)).json();
    const candles = data.map(k => ({
      o: parseFloat(k[1]), h: parseFloat(k[2]),
      l: parseFloat(k[3]), c: parseFloat(k[4])
    }));
    const last = candles[candles.length - 1];
    const change = ((last.c - candles[0].o) / candles[0].o) * 100;
    document.getElementById('crypto-current-price').textContent = fmtPrice(last.c);
    const chEl = document.getElementById('crypto-current-change');
    chEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
    chEl.className   = change >= 0 ? 'pos' : 'neg';
    const now = new Date();
    document.getElementById('crypto-updated-small').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    drawCandlesticks(candles);
  } catch (err) {
    document.getElementById('crypto-updated-small').textContent = 'Fout';
  }
}

function drawCandlesticks(candles) {
  const canvas = document.getElementById('crypto-canvas');
  // Use fixed dimensions — clientWidth/Height returns 0 when app is hidden
  const W = 480;
  const H = 320 - 38 - 34; // screen height minus header and controls
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (!candles.length) return;

  const PAD_L = 4, PAD_R = 44, PAD_T = 10, PAD_B = 16;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const minP   = Math.min(...candles.map(c => c.l));
  const maxP   = Math.max(...candles.map(c => c.h));
  const range  = maxP - minP || 1;
  const toY    = p => PAD_T + chartH - ((p - minP) / range) * chartH;

  const step  = chartW / candles.length;
  const bodyW = Math.max(1, Math.floor(step * 0.65));

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.font = '9px system-ui';
  ctx.fillStyle = 'rgba(84,110,122,0.9)';
  ctx.textAlign = 'left';
  for (let i = 0; i <= 3; i++) {
    const y = PAD_T + (chartH / 3) * i;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R + 4, y); ctx.stroke();
    ctx.fillText(fmtPriceShort(maxP - (range / 3) * i), W - PAD_R + 6, y + 3);
  }

  // Candles
  candles.forEach((c, i) => {
    const cx    = PAD_L + step * i + step / 2;
    const isUp  = c.c >= c.o;
    const color = isUp ? '#69f0ae' : '#ff5252';
    const top   = toY(Math.max(c.o, c.c));
    const bot   = toY(Math.min(c.o, c.c));
    ctx.fillStyle = ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, toY(c.h)); ctx.lineTo(cx, toY(c.l)); ctx.stroke();
    ctx.fillRect(cx - bodyW / 2, top, bodyW, Math.max(1, bot - top));
  });

  // Last price line
  const ly = toY(candles[candles.length - 1].c);
  ctx.setLineDash([3, 3]);
  ctx.strokeStyle = 'rgba(79,195,247,0.5)';
  ctx.beginPath(); ctx.moveTo(PAD_L, ly); ctx.lineTo(W - PAD_R + 4, ly); ctx.stroke();
  ctx.setLineDash([]);
}

// ── Init ──────────────────────────────────────────────────────────────────────
connectWS();
fetchWeather();
fetchCrypto();
setInterval(fetchWeather, REFRESH_MS);
setInterval(fetchCrypto,  REFRESH_MS);
resetRotateTimer();
</script>
</body>
</html>
