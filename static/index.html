<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiTV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --accent: #4fc3f7;
    --text: #e8eaf6; --muted: #546e7a; --green: #69f0ae; --red: #ff5252;
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    touch-action: none; user-select: none;
    cursor: none;
  }

  /* ── Status dot ── */
  #ws-dot {
    position: fixed; top: 6px; right: 8px; z-index: 100;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s;
  }
  #ws-dot.on { background: var(--green); }

  /* ── Apps ── */
  .app {
    position: absolute; width: 100%; height: 100%;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .app.active { display: flex; }

  /* ── CRYPTO ── */
  #app-crypto {
    background: linear-gradient(160deg, #0a0f1a 0%, #0a0a0f 100%);
    justify-content: flex-start; align-items: stretch; padding: 0;
  }
  #crypto-header {
    display: flex; align-items: center;
    padding: 6px 10px 4px; gap: 8px;
    height: 38px; flex-shrink: 0;
  }
  .coin-tab {
    padding: 3px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
  }
  .coin-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  #crypto-price-info { flex: 1; text-align: right; }
  #crypto-current-price { font-size: 18px; font-weight: 200; color: var(--text); }
  #crypto-current-change { font-size: 12px; margin-left: 5px; }
  #crypto-current-change.pos { color: var(--green); }
  #crypto-current-change.neg { color: var(--red); }
  #crypto-canvas-wrap { flex: 1; overflow: hidden; min-height: 0; }
  #crypto-canvas { display: block; }
  #crypto-controls {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px 6px; height: 34px; flex-shrink: 0;
  }
  .ctrl-group { display: flex; gap: 4px; align-items: center; }
  .ctrl-label { font-size: 9px; color: var(--muted); margin-right: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .ctrl-btn {
    padding: 3px 8px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px; color: var(--muted); cursor: pointer; background: transparent;
  }
  .ctrl-btn.active { background: rgba(79,195,247,0.15); color: var(--accent); border-color: var(--accent); }
  #crypto-updated-small { font-size: 10px; color: var(--muted); }

  /* ── PHOTO ── */
  #app-photo { background: #000; cursor: pointer; }
  #photo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  #photo-return {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
  }
  #photo-timer {
    position: absolute; top: 8px; right: 16px;
    font-size: 10px; color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>

<div id="ws-dot"></div>

<!-- CRYPTO (default) -->
<div id="app-crypto" class="app active">
  <div id="crypto-header">
    <div class="coin-tab active" data-coin="BTC" onclick="selectCoin('BTC')">₿ BTC</div>
    <div class="coin-tab" data-coin="ETH" onclick="selectCoin('ETH')">Ξ ETH</div>
    <div id="crypto-price-info">
      <span id="crypto-current-price">$--</span>
      <span id="crypto-current-change" class="pos">--%</span>
    </div>
  </div>
  <div id="crypto-canvas-wrap">
    <canvas id="crypto-canvas"></canvas>
  </div>
  <div id="crypto-controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Bars</span>
      <div class="ctrl-btn active" data-bars="30" onclick="selectBars(30)">30</div>
      <div class="ctrl-btn" data-bars="50" onclick="selectBars(50)">50</div>
      <div class="ctrl-btn" data-bars="80" onclick="selectBars(80)">80</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-btn" data-interval="1h" onclick="selectInterval('1h')">1H</div>
      <div class="ctrl-btn active" data-interval="4h" onclick="selectInterval('4h')">4H</div>
      <div class="ctrl-btn" data-interval="1d" onclick="selectInterval('1d')">1D</div>
    </div>
    <div id="crypto-updated-small">--:--</div>
  </div>
</div>

<!-- PHOTO (on demand) -->
<div id="app-photo" class="app">
  <img id="photo-img" src="" alt="">
  <div id="photo-return">aanraken om terug te gaan</div>
  <div id="photo-timer"></div>
</div>

<script>
const REFRESH_MS   = 5 * 60 * 1000;
const PHOTO_RETURN = 30 * 60 * 1000; // 30 minuten
const WS_URL       = `ws://${location.host}/ws`;

let photoTimer = null;
let photoCountdown = null;
let ws = null;

// ── App switching ─────────────────────────────────────────────────────────────
function showCrypto() {
  clearTimeout(photoTimer);
  clearInterval(photoCountdown);
  document.getElementById('app-photo').classList.remove('active');
  document.getElementById('app-crypto').classList.add('active');
}

function showPhoto(src) {
  if (src) {
    const img = document.getElementById('photo-img');
    img.src = src;
  }
  document.getElementById('app-crypto').classList.remove('active');
  document.getElementById('app-photo').classList.add('active');

  // Countdown timer
  let remaining = PHOTO_RETURN;
  const timerEl = document.getElementById('photo-timer');
  clearInterval(photoCountdown);
  photoCountdown = setInterval(() => {
    remaining -= 1000;
    const min = Math.floor(remaining / 60000);
    const sec = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = `${min}:${String(sec).padStart(2,'0')}`;
    if (remaining <= 0) { clearInterval(photoCountdown); showCrypto(); }
  }, 1000);

  clearTimeout(photoTimer);
  photoTimer = setTimeout(showCrypto, PHOTO_RETURN);
}

// Touch anywhere on photo → terug naar crypto
document.getElementById('app-photo').addEventListener('touchstart', e => {
  e.preventDefault();
  showCrypto();
}, { passive: false });

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => document.getElementById('ws-dot').classList.add('on');
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'show_image') {
      showPhoto(msg.data);
    } else if (msg.type === 'switch_app') {
      if (msg.app === 'photo') showPhoto(null);
      else showCrypto();
    }
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('on');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
}

// ── Crypto ────────────────────────────────────────────────────────────────────
let cryptoCoin     = 'BTC';
let cryptoInterval = '4h';
let cryptoBars     = 30;
const BINANCE_SYMBOLS = { BTC: 'BTCUSDT', ETH: 'ETHUSDT' };

function fmtPrice(p) {
  if (p >= 1000) return '$' + p.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (p >= 1)    return '$' + p.toFixed(2);
  return '$' + p.toFixed(4);
}
function fmtPriceShort(p) {
  if (p >= 1000) return '$' + (p/1000).toFixed(1) + 'k';
  if (p >= 1)    return '$' + p.toFixed(1);
  return '$' + p.toFixed(3);
}

function selectCoin(coin) {
  cryptoCoin = coin;
  document.querySelectorAll('.coin-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.coin === coin));
  fetchCrypto();
}
function selectInterval(iv) {
  cryptoInterval = iv;
  document.querySelectorAll('[data-interval]').forEach(b =>
    b.classList.toggle('active', b.dataset.interval === iv));
  fetchCrypto();
}
function selectBars(n) {
  cryptoBars = n;
  document.querySelectorAll('[data-bars]').forEach(b =>
    b.classList.toggle('active', b.dataset.bars == n));
  fetchCrypto();
}

async function fetchCrypto() {
  const sym = BINANCE_SYMBOLS[cryptoCoin];
  try {
    const [kRes, tRes] = await Promise.all([
      fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${cryptoInterval}&limit=${cryptoBars}`),
      fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`)
    ]);
    const candles = await kRes.json();
    const ticker  = await tRes.json();

    const price  = parseFloat(ticker.lastPrice);
    const change = parseFloat(ticker.priceChangePercent);
    const priceEl  = document.getElementById('crypto-current-price');
    const changeEl = document.getElementById('crypto-current-change');
    priceEl.textContent  = fmtPrice(price);
    changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
    changeEl.className   = change >= 0 ? 'pos' : 'neg';

    drawCandlesticks(candles);

    const now = new Date();
    document.getElementById('crypto-updated-small').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch(e) { console.error('fetchCrypto', e); }
}

function drawCandlesticks(candles) {
  const canvas = document.getElementById('crypto-canvas');
  const W = window.innerWidth;
  const H = window.innerHeight - 38 - 34;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const PAD_L = 8, PAD_R = 50, PAD_T = 8, PAD_B = 18;
  const prices = candles.flatMap(c => [parseFloat(c[2]), parseFloat(c[3])]);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const range = maxP - minP || 1;
  const chartW = W - PAD_L - PAD_R, chartH = H - PAD_T - PAD_B;
  const toY = p => PAD_T + chartH - ((p - minP) / range) * chartH;
  const step   = chartW / candles.length;
  const bodyW  = Math.max(1, Math.floor(step * 0.65));

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  for (let i = 0; i <= 4; i++) {
    const y = PAD_T + (chartH / 4) * i;
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    const price = maxP - (range / 4) * i;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(fmtPriceShort(price), W - PAD_R + 3, y + 3);
  }

  candles.forEach((c, i) => {
    const o = parseFloat(c[1]), h = parseFloat(c[2]);
    const l = parseFloat(c[3]), cl = parseFloat(c[4]);
    const x = PAD_L + i * step + step / 2;
    const color = cl >= o ? '#69f0ae' : '#ff5252';
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, toY(h)); ctx.lineTo(x, toY(l)); ctx.stroke();
    const bodyTop = toY(Math.max(o, cl)), bodyBot = toY(Math.min(o, cl));
    const bh = Math.max(1, bodyBot - bodyTop);
    ctx.fillStyle = color;
    ctx.fillRect(x - bodyW / 2, bodyTop, bodyW, bh);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
connectWS();
fetchCrypto();
setInterval(fetchCrypto, REFRESH_MS);
</script>
</body>
</html>
